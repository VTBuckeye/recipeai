global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'recipeai'
    environment: 'development'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Load rules once and periodically evaluate them
# rule_files:
#   - "rules/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # RecipeAI Backend Server
  - job_name: 'recipeai-server'
    static_configs:
      - targets: ['server:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # RecipeAI Client (if web vitals exposed)
  - job_name: 'recipeai-client'
    static_configs:
      - targets: ['client:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # MongoDB Exporter (optional - can be added later)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongodb-exporter:9216']

  # MinIO metrics
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets: ['minio:9000']

  # PostgreSQL Exporter (optional - can be added later)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Docker container metrics via cAdvisor (optional - can be added later)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
