server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape logs from Docker containers
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers in the recipeai network
      - source_labels: ['__meta_docker_container_name']
        regex: '/recipeai-.*'
        action: keep

      # Set job label based on container name (remove leading slash and prefix)
      - source_labels: ['__meta_docker_container_name']
        target_label: 'job'
        regex: '/recipeai-(.*)'
        replacement: '$1'

      # Set container label (full name without leading slash)
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
        regex: '/(.*)'
        replacement: '$1'

      # Set container ID label
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
        regex: '(.{12}).*'
        replacement: '$1'

      # Set image label
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      # Set log path
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/*-json.log'

    pipeline_stages:
      # Parse JSON logs from Docker
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time

      # Extract timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Set log output
      - output:
          source: output
